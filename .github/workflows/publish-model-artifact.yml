name: Publish Model Artifact

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag for manual publishing.
        required: true
        default: dev

concurrency:
  group: publish-model-artifact-${{ github.ref }}-${{ inputs.image_tag }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  MODEL_ARTIFACT_REPOSITORY: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-models

jobs:
  publish-model-artifact:
    name: Download models and push OCI artifact
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: scripts/artifactor/go.mod
          cache-dependency-path: scripts/artifactor/go.sum

      - name: Prepare model files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv sync --frozen --no-dev --group vision
          uv run --frozen --no-sync scripts/prepare_models.py --output-dir models

      - name: Push OCI artifact to GHCR
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run ./scripts/artifactor \
            --dir models \
            --repo "${{ env.MODEL_ARTIFACT_REPOSITORY }}" \
            --tag "${{ inputs.image_tag }}"
