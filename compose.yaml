services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rabbitmq:
    image: rabbitmq:4.3.0-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  seaweedfs:
    image: chrislusf/seaweedfs:4.26
    ports:
      - "8333:8333"
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs
      AWS_SECRET_ACCESS_KEY: seaweedfs
      S3_BUCKET: images
    volumes:
      - seaweedfs_storage:/data

  gateway:
    build:
      context: .
      dockerfile: gateway.Dockerfile
    depends_on:
      - qdrant
      - rabbitmq
      - seaweedfs
      - dense-service
      - sparse-service
      - ocr-service
      - caption-service
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: picca_images
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_QUEUE: image_jobs
      S3_ENDPOINT_URL: http://seaweedfs:8333
      S3_BUCKET: images
      S3_ACCESS_KEY_ID: seaweedfs
      S3_SECRET_ACCESS_KEY: seaweedfs
      DENSE_SERVICE_URL: http://dense-service:8001
      SPARSE_SERVICE_URL: http://sparse-service:8002
      OCR_SERVICE_URL: http://ocr-service:8003
      CAPTION_SERVICE_URL: http://caption-service:8004
      INGEST_BATCH_SIZE: 8
      INGEST_BATCH_WAIT_SECONDS: 2.0
    ports:
      - "8000:8000"

  dense-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_dense_service.py" ]
    environment:
      PORT: 8001
      MODEL_DEVICE: cpu
    ports:
      - "8001:8001"

  sparse-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_sparse_service.py" ]
    environment:
      PORT: 8002
      MODEL_DEVICE: cpu
    ports:
      - "8002:8002"

  ocr-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_ocr_service.py" ]
    environment:
      PORT: 8003
      MODEL_DEVICE: cpu
    ports:
      - "8003:8003"

  caption-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_caption_service.py" ]
    environment:
      PORT: 8004
      MODEL_DEVICE: cpu
    ports:
      - "8004:8004"

volumes:
  qdrant_storage:
  seaweedfs_storage:
