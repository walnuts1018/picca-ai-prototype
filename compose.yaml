services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    # volumes:
    #   - qdrant_storage:/qdrant/storage

  rabbitmq:
    image: rabbitmq:4.3.0-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  seaweedfs:
    image: chrislusf/seaweedfs:4.26
    ports:
      - "8333:8333" # S3 API
      - "8888:8888" # Filer
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs
      AWS_SECRET_ACCESS_KEY: seaweedfs
      S3_BUCKET: images
    # volumes:
    #   - seaweedfs_storage:/data

  gateway:
    build:
      context: .
      dockerfile: gateway.Dockerfile
    depends_on:
      - qdrant
      - rabbitmq
      - seaweedfs
      - dense-service
      - sparse-service
      - ocr-service
      - caption-service
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: picca_images
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_QUEUE: image_jobs
      RABBITMQ_RESULT_QUEUE: image_job_results
      S3_ENDPOINT_URL: http://seaweedfs:8333
      S3_BUCKET: images
      S3_ACCESS_KEY_ID: seaweedfs
      S3_SECRET_ACCESS_KEY: seaweedfs
      DENSE_SERVICE_URL: http://dense-service:8001
      SPARSE_SERVICE_URL: http://sparse-service:8002
      OCR_SERVICE_URL: http://ocr-service:8003
      CAPTION_SERVICE_URL: http://caption-service:8004
      INGEST_BATCH_SIZE: 8
      INGEST_BATCH_WAIT_SECONDS: 2.0
    ports:
      - "8000:8000"

  debug-web:
    build:
      context: .
      dockerfile: debug-web.Dockerfile
    depends_on:
      - gateway
      - rabbitmq
      - seaweedfs
    environment:
      DEBUG_WEB_HOST: 0.0.0.0
      DEBUG_WEB_PORT: 8080
      GATEWAY_BASE_URL: http://gateway:8000
      SQLITE_PATH: /data/debug-web.sqlite
      STATUS_POLL_INTERVAL_MS: 3000
      SEARCH_TIMEOUT_SECONDS: 30
      UPLOAD_OBJECT_PREFIX: debug/
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_QUEUE: image_jobs
      RABBITMQ_RESULT_QUEUE: image_job_results
      S3_ENDPOINT_URL: http://seaweedfs:8333
      S3_BUCKET: images
      S3_ACCESS_KEY_ID: seaweedfs
      S3_SECRET_ACCESS_KEY: seaweedfs
      MAX_UPLOAD_SIZE_MB: 64
    volumes:
      - ./tmp/debug-web:/data
    ports:
      - "8080:8080"

  dense-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_dense_service.py" ]
    environment:
      PORT: 8001
      MODEL_DEVICE: cpu
      DENSE_MODEL_NAME: /models/waon-siglip2-base-patch16-256
    volumes:
      - ./models:/models
    ports:
      - "8001:8001"

  sparse-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_sparse_service.py" ]
    environment:
      PORT: 8002
      MODEL_DEVICE: cpu
      SPARSE_MODEL_NAME: /models/light-splade-japanese-28M
    volumes:
      - ./models:/models
    ports:
      - "8002:8002"

  ocr-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_ocr_service.py" ]
    environment:
      PORT: 8003
      MODEL_DEVICE: cpu
      PADDLEX_HOME: /models/paddlex
    volumes:
      - ./models:/models
    ports:
      - "8003:8003"

  caption-service:
    build:
      context: .
      dockerfile: model.Dockerfile
    platform: linux/amd64
    command: [ "python", "scripts/run_caption_service.py" ]
    environment:
      PORT: 8004
      MODEL_DEVICE: cpu
      FLORENCE2_MODEL_NAME: /models/Florence-2-base-ft
      TRANSLATE_MODEL_NAME: /models/CAT-Translate-0.8b
    volumes:
      - ./models:/models
    ports:
      - "8004:8004"

# volumes:
#   qdrant_storage:
#   seaweedfs_storage:
